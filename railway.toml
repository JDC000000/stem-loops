# Railway deployment config
# Two services: `web` (Next.js) and `worker` (Python + Demucs).
# Redis is a managed plugin. R2 is external (Cloudflare).

[build]
builder = "DOCKERFILE"

[[services]]
name = "web"
dockerfilePath = "Dockerfile"
startCommand = "npm start"
healthcheckPath = "/api/jobs"

[[services]]
name = "worker"
dockerfilePath = "worker/Dockerfile"
# Worker has no HTTP endpoint — Railway will keep it running
